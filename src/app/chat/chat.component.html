
<button class="menu-btn" [class.hidden]="isMenuOpen" (click)="toggleMenu()">
  <div class="hamburger">
    <span></span>
    <span></span>
    <span></span>
  </div>
</button>

<div class="side-nav" [class.open]="isMenuOpen">
  <div class="side-nav-header">
    <h3>AI Tutoring Assistant</h3>
  </div>
  <ul class="side-nav-menu">
    <li><a href="#" (click)="navigateTo('home'); $event.preventDefault()">Home</a></li>
    <li><a href="#" (click)="navigateTo('subjects'); $event.preventDefault()">Subjects</a></li>
    <li><a href="#" (click)="navigateTo('quiz'); $event.preventDefault()">Quiz</a></li>
    <li><a href="#" (click)="navigateTo('performance'); $event.preventDefault()">Performance</a></li>
    <li class="logout"><a href="#" (click)="navigateTo('login'); $event.preventDefault()">Logout</a></li>
  </ul>
</div>

<div class="overlay" [class.show]="isMenuOpen" (click)="closeMenu()"></div>
<div class="main-content">
  <div class="chat-container">
    <div class="subject-badge" *ngIf="selectedSubject">
      Current Subject: <strong>{{ selectedSubject }}</strong>
    </div>
    <!-- Chat Card -->
    <div class="chat-card">
      <h2 class="chat-title">AI Tutoring Assistant</h2>
      <h4 class="chat-subtitle">Hello! How can I help you today?</h4>
      <!-- Chat History -->
    <div class="chat-history" *ngIf="chatHistory.length > 1">
  <div class="message" *ngFor="let msg of chatHistory">
 <div class="user-message" *ngIf="msg.question !== 'System'">
 <strong>You:</strong> {{ msg.question }}
</div>
 <div class="bot-message" *ngIf="msg.answer !== '...' && msg.question !== 'System'">
<strong>AI Tutor:</strong> <span [innerHTML]="formatAnswer(msg.answer)"></span>
  </div>
</div>
 </div>
   <!-- Input Group -->
<div class="input-group">
<input 
 type="text" 
 [(ngModel)]="userMessage" 
 placeholder="Type in English..."
 (keyup.enter)="sendMessage()"
   [disabled]="isLoading">
  <button class="send-btn" (click)="sendMessage()" [disabled]="isLoading">
  {{ isLoading ? '...' : 'Send' }}
 </button>
</div>
  </div>
  </div>
</div>
